<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">What an API Endpoint Actually Is</title>
  <desc id="desc">Beginner-friendly cover image showing a browser, an API endpoint, and a database connected together.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1350" cy="140" r="130" fill="#60a5fa" opacity="0.15"/>
  <circle cx="220" cy="760" r="180" fill="#93c5fd" opacity="0.12"/>
  <text x="120" y="180" fill="#e2e8f0" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="700">What an API Endpoint</text>
  <text x="120" y="255" fill="#e2e8f0" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="700">Actually Is</text>
  <text x="120" y="325" fill="#bfdbfe" font-size="30" font-family="Arial, Helvetica, sans-serif">A beginner-friendly guide to requests, responses, and URLs</text>

  <rect x="140" y="430" rx="24" ry="24" width="300" height="220" fill="#eff6ff"/>
  <text x="210" y="500" fill="#1e3a8a" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Browser / App</text>
  <text x="180" y="555" fill="#334155" font-size="26" font-family="Arial, Helvetica, sans-serif">Sends a request</text>
  <text x="175" y="595" fill="#334155" font-size="26" font-family="Arial, Helvetica, sans-serif">to a specific URL</text>

  <rect x="650" y="380" rx="24" ry="24" width="320" height="300" fill="#dbeafe" stroke="#93c5fd" stroke-width="4"/>
  <text x="722" y="455" fill="#1d4ed8" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">API</text>
  <text x="700" y="505" fill="#1e293b" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Endpoint</text>
  <text x="705" y="565" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">/api/users/42</text>
  <text x="725" y="605" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">GET</text>

  <rect x="1180" y="430" rx="24" ry="24" width="280" height="220" fill="#eff6ff"/>
  <text x="1255" y="500" fill="#1e3a8a" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Database</text>
  <text x="1225" y="555" fill="#334155" font-size="26" font-family="Arial, Helvetica, sans-serif">Stores or fetches</text>
  <text x="1235" y="595" fill="#334155" font-size="26" font-family="Arial, Helvetica, sans-serif">the data</text>

  <line x1="440" y1="540" x2="650" y2="540" stroke="#f8fafc" stroke-width="10" stroke-linecap="round"/>
  <polygon points="650,540 620,520 620,560" fill="#f8fafc"/>
  <line x1="970" y1="540" x2="1180" y2="540" stroke="#f8fafc" stroke-width="10" stroke-linecap="round"/>
  <polygon points="1180,540 1150,520 1150,560" fill="#f8fafc"/>
</svg>
