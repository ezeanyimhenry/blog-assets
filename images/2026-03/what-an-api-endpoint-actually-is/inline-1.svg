<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">API endpoint request and response flow</title>
  <desc id="desc">Diagram showing client request to an API endpoint and JSON response coming back.</desc>
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="90" y="120" fill="#0f172a" font-size="52" font-family="Arial, Helvetica, sans-serif" font-weight="700">How an API endpoint fits into a request</text>

  <rect x="90" y="250" rx="22" ry="22" width="290" height="220" fill="#dbeafe"/>
  <text x="175" y="330" fill="#1d4ed8" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Client</text>
  <text x="140" y="385" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">Browser, mobile app,</text>
  <text x="155" y="420" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">or another server</text>

  <rect x="545" y="220" rx="22" ry="22" width="330" height="280" fill="#bfdbfe"/>
  <text x="620" y="300" fill="#1e3a8a" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">Endpoint</text>
  <text x="610" y="355" fill="#1e293b" font-size="28" font-family="Arial, Helvetica, sans-serif">GET /api/tasks</text>
  <text x="590" y="405" fill="#475569" font-size="24" font-family="Arial, Helvetica, sans-serif">Receives the request,</text>
  <text x="590" y="440" fill="#475569" font-size="24" font-family="Arial, Helvetica, sans-serif">runs code, returns data</text>

  <rect x="1020" y="250" rx="22" ry="22" width="290" height="220" fill="#dbeafe"/>
  <text x="1100" y="330" fill="#1d4ed8" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Response</text>
  <text x="1085" y="385" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">Status + headers</text>
  <text x="1105" y="420" fill="#334155" font-size="24" font-family="Arial, Helvetica, sans-serif">+ JSON body</text>

  <line x1="380" y1="360" x2="545" y2="360" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  <polygon points="545,360 515,340 515,380" fill="#2563eb"/>
  <text x="395" y="335" fill="#2563eb" font-size="22" font-family="Arial, Helvetica, sans-serif">Request</text>

  <line x1="875" y1="360" x2="1020" y2="360" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/>
  <polygon points="1020,360 990,340 990,380" fill="#0f766e"/>
  <text x="900" y="335" fill="#0f766e" font-size="22" font-family="Arial, Helvetica, sans-serif">Response</text>

  <rect x="430" y="600" rx="18" ry="18" width="540" height="180" fill="#0f172a"/>
  <text x="470" y="665" fill="#e2e8f0" font-size="28" font-family="Courier New, monospace">GET https://example.com/api/tasks</text>
  <text x="470" y="715" fill="#93c5fd" font-size="24" font-family="Courier New, monospace">200 OK</text>
  <text x="470" y="755" fill="#bfdbfe" font-size="22" font-family="Courier New, monospace">[{"id":1,"title":"Write post"}]</text>
</svg>
